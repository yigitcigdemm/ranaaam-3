<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beni Seviyor musun? 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9de2 0%, #fbc7f7 30%, #c9b8ff 70%, #a3d9ff 100%);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.18;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(30deg); opacity: 0; }
    }

    /* Center card */
    .card-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 52px 56px 44px;
      text-align: center;
      box-shadow:
        0 8px 32px rgba(200, 100, 200, 0.18),
        0 2px 8px rgba(0,0,0,0.08);
      border: 2.5px solid rgba(255,255,255,0.9);
      max-width: 420px;
      width: 90vw;
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .emoji-top {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 14px;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.22); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.14); }
    }

    .question {
      font-family: 'Pacifico', cursive;
      font-size: 2rem;
      color: #c2185b;
      line-height: 1.25;
      margin-bottom: 10px;
      text-shadow: 0 2px 8px rgba(194,24,91,0.12);
    }

    .subtitle {
      font-size: 0.95rem;
      color: #b06090;
      margin-bottom: 36px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      padding: 14px 40px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      letter-spacing: 0.02em;
    }

    .btn-evet {
      background: linear-gradient(135deg, #ff4fa3, #e91e8c);
      color: #fff;
      box-shadow: 0 4px 18px rgba(233,30,140,0.35);
    }

    .btn-evet:hover {
      transform: scale(1.07) translateY(-2px);
      box-shadow: 0 8px 28px rgba(233,30,140,0.45);
    }

    .btn-evet:active {
      transform: scale(0.97);
    }

    /* Hayır button — fixed position so it can roam freely */
    .btn-hayir {
      position: fixed;
      background: linear-gradient(135deg, #b0bec5, #90a4ae);
      color: #fff;
      box-shadow: 0 4px 14px rgba(100,120,140,0.25);
      z-index: 100;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .btn-hayir:hover {
      transform: scale(1.05);
    }

    /* Confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <!-- Card -->
  <div class="card-wrap">
    <div class="card">
      <span class="emoji-top">💖</span>
      <div class="question">Beni seviyor musun?</div>
      <div class="subtitle">Düşün... ama çok da düşünme! 🥺</div>
      <div class="btn-row">
        <button class="btn btn-evet" onclick="evet()">Evet 💕</button>
        <!-- placeholder so row keeps width; real hayir is fixed -->
        <span style="display:inline-block;width:120px;height:54px;"></span>
      </div>
    </div>
  </div>

  <!-- Hayır button rendered fixed so it can jump around -->
  <button class="btn btn-hayir" id="btnHayir" onclick="hayir()">Hayır 😒</button>

  <script>
    /* ---- Floating hearts background ---- */
    const bg = document.getElementById('heartsBg');
    const emojis = ['💗','💓','💞','💕','🌸','✨','💫','🩷'];
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('span');
      s.className = 'heart-float';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = Math.random() * 100 + 'vw';
      s.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
      const dur = 7 + Math.random() * 10;
      s.style.animationDuration = dur + 's';
      s.style.animationDelay = -(Math.random() * dur) + 's';
      bg.appendChild(s);
    }

    /* ---- Place hayir button initially near the card ---- */
    const btnHayir = document.getElementById('btnHayir');

    function placeHayirInitial() {
      const vw = window.innerWidth, vh = window.innerHeight;
      // roughly right-of-center under the card
      btnHayir.style.left = (vw / 2 + 30) + 'px';
      btnHayir.style.top  = (vh / 2 + 60) + 'px';
    }
    placeHayirInitial();
    window.addEventListener('resize', placeHayirInitial);

    /* ---- Hayır: jump to random position ---- */
    function hayir() {
      const bw = btnHayir.offsetWidth  || 120;
      const bh = btnHayir.offsetHeight || 54;
      const margin = 20;
      const x = margin + Math.random() * (window.innerWidth  - bw - margin * 2);
      const y = margin + Math.random() * (window.innerHeight - bh - margin * 2);
      btnHayir.style.left = x + 'px';
      btnHayir.style.top  = y + 'px';
    }

    /* ---- Evet: YouTube redirect + confetti ---- */
    function evet() {
      launchConfetti();
      setTimeout(() => {
        window.open('https://www.youtube.com/watch?v=QIQSEVUkfe0', '_blank');
      }, 500);
    }

    /* ---- Confetti ---- */
    const canvas = document.getElementById('confetti');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    let animId = null;

    function launchConfetti() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      const colors = ['#ff4fa3','#e91e8c','#ff80c8','#ffd6f0','#c9b8ff','#a3d9ff','#ffea70'];
      for (let i = 0; i < 180; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -10 - Math.random() * 200,
          r: 5 + Math.random() * 8,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 5,
          vy: 3 + Math.random() * 5,
          alpha: 1,
          shape: Math.random() > 0.5 ? 'circle' : 'heart',
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random() - 0.5) * 0.15,
        });
      }
      if (animId) cancelAnimationFrame(animId);
      animateConfetti();
    }

    function drawHeart(ctx, x, y, size) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.5);
      ctx.bezierCurveTo( size,      -size * 1.5,  size * 2,  size * 0.5, 0,  size * 1.4);
      ctx.bezierCurveTo(-size * 2,  size * 0.5,  -size,     -size * 1.5, 0, -size * 0.5);
      ctx.fill();
      ctx.restore();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += 0.12;
        p.rot += p.rotV;
        if (p.y > canvas.height * 0.7) p.alpha -= 0.025;
        if (p.alpha <= 0) return;
        alive = true;
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle   = p.color;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          drawHeart(ctx, 0, 0, p.r * 0.55);
        }
        ctx.restore();
      });
      ctx.globalAlpha = 1;
      if (alive) animId = requestAnimationFrame(animateConfetti);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
